name: Update Company DB

on:
  schedule:
    - cron: '0 18 * * 0'  # UTC 18:00 = KST 03:00 일요일
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Update DART DB
        run: python tools/update_company_db.py --source dart
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}

      - name: Update Market Data
        run: python tools/update_company_db.py --source market

      - name: Update AI Metrics
        run: python tools/update_company_db.py --source ai
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync to meta.json
        run: python tools/sync_meta_from_dart.py

      - name: Check data freshness
        run: python tools/check_freshness.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/demo/data/
          git diff --staged --quiet || git commit -m "chore(data): weekly DB update $(date +%Y-%m-%d)"
          git push
