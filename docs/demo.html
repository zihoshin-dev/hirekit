<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />

  <meta name="description" content="HireKit 데모: 기업을 선택하고 JD와 이력서를 입력하면 스코어카드와 리포트를 바로 볼 수 있어요." />
  <meta property="og:title" content="HireKit 데모 — 기업 분석 체험" />
  <meta property="og:description" content="80개 기업 데이터로 스코어카드와 매칭 분석을 체험해보세요." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
          },
        },
      },
    }
  </script>
  <style>
    :root {
      --bg: #FFFFFF;
      --bg-secondary: #F4F5F7;
      --bg-tertiary: #EAEBEE;
      --text-primary: #191F28;
      --text-secondary: #4E5968;
      --text-tertiary: #8B95A1;
      --border: #E5E8EB;
    }
    html.dark {
      --bg: #17171C;
      --bg-secondary: #1E1E24;
      --bg-tertiary: #2C2C35;
      --text-primary: #F2F4F6;
      --text-secondary: #B0B8C1;
      --text-tertiary: #6B7684;
      --border: #2C2C35;
    }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    pre, code, .font-mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    .t-primary { color: var(--text-primary); }
    .t-secondary { color: var(--text-secondary); }
    .t-tertiary { color: var(--text-tertiary); }
    .surface { background-color: var(--bg); }
    .surface-secondary { background-color: var(--bg-secondary); }
    .btn-click:active { transform: scale(0.98); }

    /* Company grid */
    .company-card {
      cursor: pointer;
      border: 1.5px solid var(--border);
      background-color: var(--bg);
      border-radius: 12px;
      padding: 12px 14px;
      transition: border-color 0.15s ease, background-color 0.15s ease, transform 0.12s ease;
    }
    .company-card:hover { border-color: #3182F6; transform: translateY(-1px); }
    .company-card.selected {
      border-color: #3182F6;
      background-color: #EBF3FE;
    }
    html.dark .company-card.selected { background-color: rgba(49,130,246,0.12); }

    /* Detail panel */
    #detailPanel {
      display: none;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      background-color: var(--bg);
      overflow: hidden;
      animation: slideDown 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Tabs */
    .tab-btn {
      transition: all 0.15s ease;
      color: var(--text-tertiary);
      border-bottom: 2px solid transparent;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
    }
    .tab-btn:hover { color: var(--text-secondary); }
    .tab-btn.active {
      color: #3182F6;
      border-bottom-color: #3182F6;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Score bar animation */
    .score-bar { transition: width 0.9s cubic-bezier(0.4,0,0.2,1); }

    /* Inputs */
    textarea, input[type="text"], input[type="url"] {
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 12px 16px;
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
      resize: vertical;
    }
    textarea:focus, input[type="text"]:focus, input[type="url"]:focus {
      border-color: #3182F6;
    }
    textarea::placeholder, input::placeholder { color: var(--text-tertiary); }

    /* Search input */
    #companySearch {
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 11px 16px 11px 42px;
      width: 100%;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    #companySearch:focus { border-color: #3182F6; }
    #companySearch::placeholder { color: var(--text-tertiary); }

    /* Modal */
    #modalOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #modalOverlay.open { display: flex; }
    #modalBox {
      background: var(--bg);
      border-radius: 20px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px;
      animation: modalIn 0.2s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Keyword chips */
    .kw-match  { background: rgba(0,196,113,0.12); color: #00C471; }
    .kw-miss   { background: rgba(255,69,69,0.1);  color: #FF4545; }
    .kw-neutral{ background: var(--bg-secondary);  color: var(--text-secondary); }

    nav { background-color: color-mix(in srgb, var(--bg) 80%, transparent); }

    /* Grade colors */
    .grade-s { color: #3182F6; }
    .grade-a { color: #00C471; }
    .grade-b { color: #FF9500; }
    .grade-c { color: #FF6B00; }
    .grade-d { color: #FF4545; }

    /* Scrollbar thin */
    .scroll-thin { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    /* Line clamp */
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body>

  <nav class="fixed top-0 left-0 right-0 z-50 backdrop-blur-md" style="height:64px; border-bottom:1px solid var(--border);">
    <div class="max-w-[1080px] mx-auto px-6 h-full flex items-center justify-between">
      <a href="index.html" class="text-lg font-bold t-primary tracking-tight">HireKit</a>

      <!-- Header -->

        <h2 class="font-bold t-primary mb-1.5" style="font-size:22px; line-height:1.4;">어느 기업을 분석할까요?</h2>

      </div>

      <!-- Detail Panel -->
      <div id="detailPanel">

        <!-- Panel Header -->
        <div class="px-6 pt-5 pb-4" style="border-bottom:1px solid var(--border);">

              <div class="flex flex-wrap items-center gap-2 mb-1">
                <h3 id="dpCompanyName" class="font-bold t-primary text-xl leading-tight"></h3>
                <span id="dpCompanyNameEng" class="text-sm t-tertiary"></span>

            <div class="flex-shrink-0 text-right">
              <div id="dpScoreNum" class="text-3xl font-bold" style="color:#3182F6; line-height:1;"></div>
              <div class="text-xs t-tertiary mt-0.5">/ 100</div>
            </div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="flex gap-0 px-2 scroll-thin" style="border-bottom:1px solid var(--border); overflow-x:auto;">
          <button class="tab-btn active" onclick="switchDetailTab('scorecard', this)">스코어카드</button>
          <button class="tab-btn" onclick="switchDetailTab('overview', this)">기업 개요</button>
          <button class="tab-btn" onclick="switchDetailTab('financials', this)">재무</button>

          <button class="tab-btn" onclick="switchDetailTab('culture', this)">문화</button>

          <button id="tabResumeBtn" class="tab-btn" onclick="switchDetailTab('resumematch', this)" style="display:none;">이력서 분석</button>

        <!-- Tab contents -->

          <!-- News -->
          <div id="dp-news" class="tab-panel">
            <div id="dpNewsContent"></div>
          </div>
          <!-- Culture -->

        <div class="flex items-center justify-between mb-5">
          <h3 class="font-bold t-primary" style="font-size:18px;">JD 매칭 분석</h3>

<script>
// ==================== Dark mode ====================
const html = document.documentElement;
const themeToggle = document.getElementById('themeToggle');
const iconSun = document.getElementById('iconSun');
const iconMoon = document.getElementById('iconMoon');

function applyTheme(dark) {
  if (dark) { html.classList.add('dark'); iconSun.classList.remove('hidden'); iconMoon.classList.add('hidden'); }
  else { html.classList.remove('dark'); iconSun.classList.add('hidden'); iconMoon.classList.remove('hidden'); }
}
const stored = localStorage.getItem('hk-theme');
if (stored === 'dark') applyTheme(true);
else if (stored === 'light') applyTheme(false);
else if (window.matchMedia('(prefers-color-scheme: dark)').matches) applyTheme(true);
themeToggle.addEventListener('click', () => {
  const isDark = html.classList.contains('dark');
  applyTheme(!isDark);
  localStorage.setItem('hk-theme', isDark ? 'light' : 'dark');
});

// ==================== State ====================
let allCompanies = [];
let selectedCompany = null;
let companyData = null;
let jdKeywords = [];
let resumeKeywords = [];

// ==================== Slug / fetch ====================
const slugOverride = {
  'CJ ENM': 'cj_enm',
  'LG CNS': 'lg_cns',
};

function getSlug(name) {
  if (slugOverride[name]) return slugOverride[name];
  return name.toLowerCase().replace(/\s+/g, '_');
}

async function fetchCompanyData(name) {
  const slug = getSlug(name);
  // Try slug directly, then URL-encoded
  for (const path of [`demo/data/companies/${slug}.json`, `demo/data/companies/${encodeURIComponent(name.toLowerCase())}.json`]) {
    try {
      const res = await fetch(path);
      if (res.ok) return await res.json();
    } catch (_) {}
  }
  return null;
}

// ==================== Load companies ====================
async function loadCompanies() {
  try {
    const res = await fetch('demo/data/meta.json');
    allCompanies = await res.json();
    renderCompanyGrid(allCompanies);
  } catch (e) {
    document.getElementById('companyGrid').innerHTML =
      '<div class="col-span-4 text-center py-8 text-sm t-tertiary">기업 데이터를 불러올 수 없어요</div>';
  }
}

function renderCompanyGrid(companies) {
  const grid = document.getElementById('companyGrid');
  const noResults = document.getElementById('noResults');
  if (companies.length === 0) {
    grid.innerHTML = '';
    noResults.classList.remove('hidden');
    return;
  }
  noResults.classList.add('hidden');
  grid.innerHTML = companies.map(c => {
    const gradeColor = getGradeColor(c.grade);
    const isSelected = selectedCompany === c.name;
    return `
      <div class="company-card${isSelected ? ' selected' : ''}"
           data-name="${escHtml(c.name)}"
           onclick="selectCompany('${c.name.replace(/'/g, "\\'")}', this)">
        <div class="font-medium t-primary text-sm leading-tight mb-1 truncate">${escHtml(c.name)}</div>
        <div class="flex items-center gap-1.5">
          <span class="font-mono text-xs font-bold" style="color:${gradeColor};">${c.grade || '—'}</span>
          <span class="text-xs t-tertiary">${Math.round(c.score || 0)}점</span>
        </div>
      </div>
    `;
  }).join('');
}

// Search
document.getElementById('companySearch').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { renderCompanyGrid(allCompanies); return; }
  renderCompanyGrid(allCompanies.filter(c => c.name.toLowerCase().includes(q)));
});

// ==================== Select company ====================
async function selectCompany(name, el) {
  selectedCompany = name;
  document.querySelectorAll('.company-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');

  // Show panel with loading state
  const panel = document.getElementById('detailPanel');
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  document.getElementById('dpCompanyName').textContent = name;
  document.getElementById('dpCompanyNameEng').textContent = '';
  document.getElementById('dpGradeBadge').textContent = '...';
  document.getElementById('dpScoreNum').textContent = '–';
  document.getElementById('dpMeta').textContent = '데이터 불러오는 중...';
  document.getElementById('dpScorecardContent').innerHTML = loadingHtml();

  // Reset extra tabs
  document.getElementById('tabJdMatchBtn').style.display = 'none';
  document.getElementById('tabResumeBtn').style.display = 'none';
  // Reset to scorecard tab
  switchDetailTab('scorecard', document.querySelector('.tab-btn'));

  const data = await fetchCompanyData(name);
  companyData = data;

  renderDetailPanel(data, name);
}

function loadingHtml() {
  return `<div class="flex items-center gap-2 text-sm t-tertiary py-8">
    <svg class="w-4 h-4 animate-spin" style="color:#3182F6;" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
    데이터를 불러오고 있어요...
  </div>`;
}

// ==================== Render detail panel ====================
function renderDetailPanel(data, name) {
  const s1 = data?.sections?.['1'] || {};
  const s4 = data?.sections?.['4'] || {};
  const s7 = data?.sections?.['7'] || {};
  const sc = data?.scorecard || {};

  const companyName = s1.company_name || name;
  const companyNameEng = s1.company_name_eng || '';
  const grade = sc.grade || data?.grade || '—';
  const total = sc.total ? Math.round(sc.total) : 0;

  // Header
  document.getElementById('dpCompanyName').textContent = companyName;
  document.getElementById('dpCompanyNameEng').textContent = companyNameEng;
  document.getElementById('dpMeta').textContent = buildMeta(s1, data);
  document.getElementById('dpScoreNum').textContent = total || '—';
  document.getElementById('dpScoreNum').style.color = getGradeColor(grade);

  const badgeEl = document.getElementById('dpGradeBadge');
  badgeEl.textContent = 'Grade ' + grade;
  badgeEl.style.backgroundColor = getGradeBg(grade);
  badgeEl.style.color = getGradeColor(grade);

  // Render tabs
  renderScorecard(sc, name);
  renderOverview(s1);
  renderFinancials(s1);
  renderNews(s1);
  renderCulture(s4, name);
}

function buildMeta(s1, data) {
  const parts = [];
  if (s1.industry) parts.push(s1.industry);
  if (s1.established) {
    const y = String(s1.established).slice(0, 4);
    if (y) parts.push(`설립 ${y}년`);
  }
  if (s1.employee_count) parts.push(`임직원 ${s1.employee_count}명`);
  else if (s1.employees?.length) {
    const total = s1.employees.reduce((sum, e) => {
      return sum + (parseInt(String(e.total || e.headcount || 0).replace(/,/g, '')) || 0);
    }, 0);
    if (total > 0) parts.push(`임직원 ${total.toLocaleString()}명`);
  }
  if (data?.sources?.length) parts.push(`${data.sources.length}개 소스`);
  return parts.join(' · ');
}

// ==================== Scorecard tab ====================
function renderScorecard(sc, name) {
  const el = document.getElementById('dpScorecardContent');
  if (!sc || !sc.total) {
    el.innerHTML = emptyState('스코어카드 데이터가 없어요.');
    return;
  }

  const total = Math.round(sc.total);
  const grade = sc.grade || getGrade(total);
  const color = getGradeColor(grade);
  const dims = sc.dimensions || [];

  // Map dimension names to Korean
  const dimLabel = {
    job_fit: 'Job Fit',
    career_leverage: '커리어 레버리지',
    growth: '성장 잠재력',
    compensation: '보상 · 복지',
    culture_fit: '문화 적합성',
  };

  // Convert 5-point score to 100-point
  const dimHtml = dims.map(d => {
    const score100 = Math.round((d.score / 5) * 100);
    const dGrade = getGrade(score100);
    const dColor = getGradeColor(dGrade);
    const label = dimLabel[d.name] || d.label || d.name;
    return `
      <div>
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-sm t-secondary">${label}</span>
          <div class="flex items-center gap-1.5">
            <span class="text-sm font-medium t-primary">${score100}</span>
            <span class="font-mono text-xs font-semibold px-1.5 py-0.5 rounded" style="background-color:${getGradeBg(dGrade)}; color:${dColor};">${dGrade}</span>
          </div>
        </div>
        <div class="h-2 rounded-full overflow-hidden" style="background-color:var(--bg-secondary);">
          <div class="h-2 rounded-full score-bar" style="width:0%; background-color:${dColor};" data-target="${score100}"></div>
        </div>
        ${d.evidence ? `<p class="text-xs t-tertiary mt-1">${escHtml(d.evidence)}</p>` : ''}
      </div>
    `;
  }).join('');

  el.innerHTML = `
    <div class="flex items-center gap-5 p-5 rounded-2xl mb-5" style="background-color:var(--bg-secondary);">
      <div class="relative flex-shrink-0">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="34" fill="none" stroke="var(--bg-tertiary)" stroke-width="7"/>
          <circle id="scoreRing" cx="40" cy="40" r="34" fill="none" stroke="${color}" stroke-width="7"
            stroke-linecap="round" stroke-dasharray="213.6" stroke-dashoffset="213.6"
            transform="rotate(-90 40 40)" style="transition:stroke-dashoffset 1.1s cubic-bezier(0.4,0,0.2,1);"/>
        </svg>
        <div class="absolute inset-0 flex items-center justify-center">
          <span id="scoreAnimNum" class="font-bold" style="font-size:20px; color:${color};">0</span>
        </div>
      </div>
      <div>
        <div class="text-xs t-tertiary mb-0.5">종합 점수</div>
        <div class="flex items-center gap-2">
          <span class="font-bold t-primary" style="font-size:26px; line-height:1;">${total}</span>
          <span class="text-sm t-tertiary">/ 100</span>
          <span class="font-mono text-sm font-bold px-2 py-0.5 rounded-lg" style="background-color:${getGradeBg(grade)}; color:${color};">Grade ${grade}</span>
        </div>
        <p class="text-sm t-secondary mt-1">${getScorecardSummary(grade, name)}</p>
      </div>
    </div>
    ${dims.length > 0 ? `<div class="space-y-4">${dimHtml}</div>` : ''}
  `;

  // Animate ring and number
  setTimeout(() => {
    const circumference = 213.6;
    const offset = circumference - (total / 100) * circumference;
    const ring = document.getElementById('scoreRing');
    if (ring) ring.style.strokeDashoffset = offset;
    let cur = 0;
    const step = Math.max(1, Math.ceil(total / 35));
    const iv = setInterval(() => {
      cur = Math.min(cur + step, total);
      const el = document.getElementById('scoreAnimNum');
      if (el) el.textContent = cur;
      if (cur >= total) clearInterval(iv);
    }, 28);
  }, 80);

  setTimeout(() => {
    document.querySelectorAll('#dp-scorecard .score-bar[data-target]').forEach(b => {
      b.style.width = b.dataset.target + '%';
    });
  }, 160);
}

function getScorecardSummary(grade, name) {
  if (grade === 'S') return `${name}은(는) 최우선 지원 추천 기업이에요.`;
  if (grade === 'A') return `${name}은(는) 적극적으로 검토해볼 만해요.`;
  if (grade === 'B') return `${name}은(는) 긍정적으로 고려해볼 수 있어요.`;
  return `${name}은(는) 신중하게 검토하세요.`;
}

// ==================== Financials tab ====================
function renderFinancials(s1) {
  const el = document.getElementById('dpFinancialsContent');
  const fins = s1.financials;
  if (!fins || fins.length === 0) { el.innerHTML = emptyState('재무 데이터가 없어요.'); return; }

  // Deduplicate by account name
  const seen = new Set();
  const deduped = fins.filter(f => {
    if (seen.has(f.account)) return false;
    seen.add(f.account);
    return true;
  });

  // Key accounts to highlight
  const keyAccounts = ['매출액', '영업이익', '당기순이익', '자산총계', '자본총계', '부채총계'];
  const sorted = [...deduped].sort((a, b) => {
    const ai = keyAccounts.findIndex(k => a.account?.includes(k));
    const bi = keyAccounts.findIndex(k => b.account?.includes(k));
    if (ai === -1 && bi === -1) return 0;
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  }).slice(0, 8);

  // Calculate YoY change for key items
  const rows = sorted.map(f => {
    const cur = parseInt(String(f.current_amount || '0').replace(/,/g, '')) || 0;
    const prev = parseInt(String(f.previous_amount || '0').replace(/,/g, '')) || 0;
    let changeHtml = '';
    if (cur && prev) {
      const pct = ((cur - prev) / Math.abs(prev) * 100).toFixed(1);
      const up = cur >= prev;
      changeHtml = `<span class="text-xs font-medium ml-2" style="color:${up ? '#00C471' : '#FF4545'};">${up ? '▲' : '▼'} ${Math.abs(pct)}%</span>`;
    }
    return `
      <div class="flex items-center justify-between text-sm py-2.5" style="border-bottom:1px solid var(--border);">
        <span class="t-secondary">${escHtml(f.account || '')}</span>
        <div class="text-right">
          <span class="font-semibold t-primary">${formatAmount(f.current_amount)}</span>
          ${f.previous_amount ? `<span class="text-xs t-tertiary ml-2">(전기 ${formatAmount(f.previous_amount)})</span>` : ''}
          ${changeHtml}
        </div>
      </div>
    `;
  });

  el.innerHTML = `
    <div class="rounded-2xl p-5" style="border:1px solid var(--border);">
      <h4 class="text-sm font-semibold t-primary mb-3">주요 재무 지표</h4>
      <div>${rows.join('')}</div>
      <p class="text-xs t-tertiary mt-3">DART 공시 데이터 기준. 단위: 원</p>
    </div>
  `;
}

// ==================== News tab ====================

  const el = document.getElementById('dpNewsContent');
  const googleNews = s1.google_news || [];
  const recentNews = s1.recent_news || [];
  const allNews = [...googleNews, ...recentNews].slice(0, 10);

  if (allNews.length === 0) { el.innerHTML = emptyState('뉴스 데이터가 없어요.'); return; }

  const newsHtml = allNews.map(n => {
    const title = escHtml(cleanText(n.title || ''));
    const source = escHtml(n.source || '');
    const pubDate = n.pub_date ? formatNewsDate(n.pub_date) : '';
    const link = n.link || '#';
    return `
      <a href="${link}" target="_blank" rel="noopener" class="block p-3.5 rounded-xl transition-colors hover:bg-[var(--bg-secondary)]" style="border:1px solid var(--border);">
        <div class="flex items-start justify-between gap-3">
          <p class="text-sm t-primary font-medium leading-snug line-clamp-2 flex-1">${title}</p>
          <svg class="w-3.5 h-3.5 t-tertiary flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        </div>
        <div class="flex items-center gap-2 mt-1.5">
          ${source ? `<span class="text-xs t-tertiary">${source}</span>` : ''}
          ${pubDate ? `<span class="text-xs t-tertiary">${pubDate}</span>` : ''}
        </div>
      </a>
    `;
  }).join('');

  el.innerHTML = `<div class="space-y-2">${newsHtml}</div>`;
}

// ==================== Culture tab ====================
function renderCulture(s4, name) {
  const el = document.getElementById('dpCultureContent');
  const positives = s4.positive_themes || [];
  const negatives = s4.negative_themes || [];
  const rating = s4.avg_rating;
  const snippets = s4.snippets || [];
  const exaCulture = s4.exa_culture || [];

  if (!positives.length && !negatives.length && !snippets.length && !exaCulture.length) {
    el.innerHTML = emptyState('문화 데이터가 없어요.');
    return;
  }

  let ratingHtml = '';
  if (rating && rating > 0) {
    const stars = Math.round(rating * 2) / 2;
    const ratingColor = rating >= 3.5 ? '#00C471' : rating >= 2.5 ? '#FF9500' : '#FF4545';
    ratingHtml = `
      <div class="flex items-center gap-2 mb-4 p-3.5 rounded-xl" style="background-color:var(--bg-secondary);">
        <span class="text-2xl font-bold" style="color:${ratingColor};">${stars.toFixed(1)}</span>
        <div>
          <div class="text-xs t-tertiary">블라인드 / 잡플래닛 평균 평점</div>
          <div class="text-xs t-secondary mt-0.5">${rating >= 3.5 ? '긍정적 평가가 많아요' : rating >= 2.5 ? '보통 수준의 평가예요' : '부정적 평가가 일부 있어요'}</div>
        </div>
      </div>
    `;
  }

  let posHtml = '';
  if (positives.length > 0) {
    posHtml = `
      <div class="mb-4">
        <h4 class="text-sm font-semibold t-primary mb-2">강점 키워드</h4>
        <div class="flex flex-wrap gap-1.5">
          ${positives.map(t => `<span class="text-xs px-2.5 py-1 rounded-lg font-medium kw-match">${escHtml(t)}</span>`).join('')}
        </div>
      </div>
    `;
  }

  let negHtml = '';
  if (negatives.length > 0) {
    negHtml = `
      <div class="mb-4">
        <h4 class="text-sm font-semibold t-primary mb-2">개선 키워드</h4>
        <div class="flex flex-wrap gap-1.5">
          ${negatives.map(t => `<span class="text-xs px-2.5 py-1 rounded-lg kw-miss">${escHtml(t)}</span>`).join('')}
        </div>
      </div>
    `;
  }

  // Exa culture excerpts
  let excerptsHtml = '';
  const cultureItems = Array.isArray(exaCulture) ? exaCulture.slice(0, 3) : [];
  if (cultureItems.length > 0) {
    excerptsHtml = `
      <div class="mt-2">
        <h4 class="text-sm font-semibold t-primary mb-2">문화 인사이트</h4>
        <div class="space-y-2">
          ${cultureItems.map(item => {
            if (typeof item === 'string') return `<div class="p-3 rounded-xl text-sm t-secondary leading-relaxed line-clamp-3" style="background-color:var(--bg-secondary);">${escHtml(item.slice(0, 200))}</div>`;
            const text = cleanText(item.text || item.preview || item.snippet || '');
            if (!text) return '';
            const src = item.url ? `<a href="${item.url}" target="_blank" style="color:#3182F6;" class="text-xs hover:underline">${escHtml(item.title || item.url)}</a>` : '';
            return `
              <div class="p-3 rounded-xl" style="background-color:var(--bg-secondary);">
                ${src ? `<div class="mb-1">${src}</div>` : ''}
                <p class="text-sm t-secondary leading-relaxed line-clamp-3">${escHtml(text.slice(0, 200))}</p>
              </div>
            `;
          }).filter(Boolean).join('')}
        </div>
      </div>
    `;
  }

  el.innerHTML = `<div>${ratingHtml}${posHtml}${negHtml}${excerptsHtml}</div>`;
}

// ==================== Tab switching ====================
function switchDetailTab(name, btnEl) {
  document.querySelectorAll('#detailPanel .tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('#detailPanel .tab-panel').forEach(p => p.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  const panel = document.getElementById('dp-' + name);
  if (panel) panel.classList.add('active');
}

// ==================== Modal ====================
function openModal(type) {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modalJd').style.display = type === 'jd' ? 'block' : 'none';

// ==================== JD Matching ====================
function runJdMatch() {
  const text = document.getElementById('jdText').value.trim();

  renderJdMatch(companyData, selectedCompany, text, jdKeywords);

  // Switch to jd match tab
  switchDetailTab('jdmatch', document.getElementById('tabJdMatchBtn'));
}

function extractJdKeywords(text) {
  // Tech keywords to look for
  const techPool = [
    'Java', 'Kotlin', 'Python', 'Go', 'Rust', 'C++', 'Swift', 'TypeScript', 'JavaScript',
    'Spring', 'Spring Boot', 'Django', 'FastAPI', 'Node.js', 'React', 'Vue', 'Angular',
    'MySQL', 'PostgreSQL', 'MongoDB', 'Redis', 'Elasticsearch', 'DynamoDB',
    'Kafka', 'RabbitMQ', 'Flink', 'Spark',
    'AWS', 'GCP', 'Azure', 'Kubernetes', 'Docker', 'Terraform',
    'MSA', 'REST', 'gRPC', 'GraphQL',
    'AI', 'ML', 'LLM', '머신러닝', '딥러닝', 'PyTorch', 'TensorFlow',
    'CI/CD', 'Git', 'Jenkins',
  ];
  const lower = text.toLowerCase();
  const found = techPool.filter(k => lower.includes(k.toLowerCase()));

  // Extract bullet points from 자격요건/우대사항 sections
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.startsWith('-') || l.startsWith('•') || l.startsWith('·'));
  const bulletKeywords = [];
  lines.forEach(line => {
    const clean = line.replace(/^[-•·]\s*/, '').slice(0, 60);
    if (clean.length > 3 && clean.length < 60) bulletKeywords.push(clean);
  });

  return { tech: found, bullets: bulletKeywords.slice(0, 12) };
}

// ==================== Grade helpers ====================
function getGrade(score) {
  if (score >= 90) return 'S';
  if (score >= 80) return 'A';
  if (score >= 65) return 'B';
  if (score >= 50) return 'C';
  return 'D';
}

function getGradeColor(grade) {
  const m = { S: '#3182F6', A: '#00C471', B: '#FF9500', C: '#FF6B00', D: '#FF4545' };
  return m[grade] || '#3182F6';
}

function getGradeBg(grade) {
  const m = { S: '#EBF3FE', A: 'rgba(0,196,113,0.1)', B: 'rgba(255,149,0,0.1)', C: 'rgba(255,107,0,0.1)', D: 'rgba(255,69,69,0.1)' };
  return m[grade] || '#EBF3FE';
}

// ==================== Formatting helpers ====================
function formatDate(d) {
  if (!d) return '';
  const s = String(d);
  if (s.length === 8) return `${s.slice(0,4)}. ${s.slice(4,6)}. ${s.slice(6,8)}.`;
  return s;
}

function formatAmount(val) {
  if (!val) return '–';
  const n = parseInt(String(val).replace(/,/g, '')) || 0;
  if (n === 0) return '–';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1_000_000_000_000) return `${sign}${(abs / 1_000_000_000_000).toFixed(1)}조원`;
  if (abs >= 100_000_000) return `${sign}${Math.round(abs / 100_000_000).toLocaleString()}억원`;
  if (abs >= 10_000) return `${sign}${Math.round(abs / 10_000).toLocaleString()}만원`;
  return `${sign}${n.toLocaleString()}원`;
}

function formatNewsDate(d) {
  if (!d) return '';
  try {
    const dt = new Date(d);
    if (isNaN(dt)) return d.slice(0, 10);
    return dt.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
  } catch { return ''; }
}

function cleanText(text) {
  return (text || '')
    .replace(/<[^>]+>/g, '')
    .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#\d+;/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function emptyState(msg) {
  return `<div class="text-sm t-tertiary py-8 text-center">${msg}</div>`;
}
